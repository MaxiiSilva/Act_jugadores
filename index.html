<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lista de Jugadores</title>

    <style>

        /* esto es todo el diseño general de la página */
        body{
            margin: 0;
            padding: 30px;
            background-color: #252424;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
        }

        /* el título principal de arriba */
        h1{
            text-align: center;
            color: #00ff88;
            margin-bottom: 30px;
        }

        /* la tabla donde van a aparecer los juegos */
        table{
            width: 100%;
            border-collapse: collapse;
            background-color: #1e1e1e;
        }

        /* la parte de arriba de la tabla donde están los nombres de las columnas */
        thead{
            background-color: #00ff88;
            color: black;
        }

        th{
            padding: 15px;
            text-align: left;
        }

        /* cada fila de la tabla */
        td{
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        /* cuando pasas el mouse por arriba de una fila se ilumina un poco */
        tr:hover{
            background-color: #2b2b2b;
        }

        /* los inputs donde escribís los datos */
        input{
            width: 95%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #2b2b2b;
            color: white;
        }

        /* todos los botones generales */
        button{
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* boton para agregar juegos */
        .add-btn{
            background-color: #00ff88;
            color: black;
        }

        /* botón para editar */
        .edit-btn{
            background-color: #0099ff;
            color: white;
        }

        /* botón para eliminar */
        .delete-btn{
            background-color: #ff3b3b;
            color: white;
        }

        /* esto es la ventanita que aparece cuando editas un juego */
        #popup{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #00ff88;
            width: 300px;
        }

        /* titulo dentro del popup */
        #popup h3{
            margin-top: 0;
            text-align: center;
            color: #00ff88;
        }

    </style>

    <script>

        /* esta es la URL de la API donde están guardados los jugadores */
        const url = "https://69fd0b4130ad0a6fd1c0705d.mockapi.io/api/players-f/jugadores";

        /* cuando la pagina carga, automáticamente trae todos los jugadores */
        window.onload = function () {
            getJugador();/* trae los jugadores de la API */
        }

        /* esta funcion trae los juagdores desde la API */
        function loadJugador() {
             /* Promise espera una respuesta de internet */
            return new Promise((resolve, reject) => {
                /* resolve se usa cuando TODO sale bien */
                /* reject se usa cuando hay un error */

                /* crea la petición */
                const request = new XMLHttpRequest();
                /* tipo de petición y URL */
                request.open('GET', url);
                 /* open prepara la petición */

                 /* GET = traer datos */
                 /* url = link de la API */

                  /* la respuesta será json */
                request.responseType = "json";
                 /* cuando llega la respuesta */
                request.onload = function () {
                    
                    if (request.status == 200) {
                        resolve(request.response); // si sale bien devuelve los datos de los jugadopres
                    } else {
                        reject("no se pudieron cargar los juegadores"); //si no devuelve error
                    }

                }
                /*si hay error de conexion*/
                request.onerror = function () {
                    reject("error de conexión");
                }
                
                request.send();

            });

        }

        /* esta función sirve para agregar un jugador nuevo */
        function addJugador() {
            /* Promise espera una respuesta de internet */
            return new Promise((resolve, reject) => {

                const request = new XMLHttpRequest();// Crea una nueva instancia para hacer peticones

                request.open('POST', url); // POST significa agregar datos nuevos 

                request.setRequestHeader("Content-Type", "application/json"); // avisa que vamos a enviar un JSON 

                /* acá agarramos lo que escribió el usuario en los inputs */
                const jugador = JSON.stringify({
                    /* toma el nombre escrito */
                    name: document.getElementById("name").value,
                      /* toma el club escrito */
                    club: document.getElementById("club").value,
                      /* toma la nacionalidad escrita */
                    nationality: document.getElementById("nationality").value
                });
                /* cuando la API responde */
                request.onload = function () {
                    /* si el jugador se agrego correctamente */
                    // 201 = creado correctamente
                    // 200 = salió bien
                    if (request.status == 201 || request.status == 200) {
                        resolve(); // se agregó bien
                    } else {
                         /* reject significa que hubo un error */
                        reject("no se pudo agregar al jugador");
                    }

                }
                
                request.onerror = function () {
                    reject("error de red");
                }
                /* manda el jugador nuevo a la API */
                request.send(jugador);

            });

        }

        /* esta función elimina un juego según su id */
        function removeJugador(id) {

            return new Promise((resolve, reject) => {

                const request = new XMLHttpRequest();
                /* DELETE = borrar */
                /* ${id} agrega el id al link */
                request.open('DELETE', `${url}/${id}`);
                 /* cuando responde la API */
                request.onload = function () {
                     /* si salió bien */
                    if (request.status == 200) {
                        resolve(); // se borró bien
                    } else {
                         /* avisa que hubo error */
                        reject("no se pudo borrar al jugador");
                    }

                }
                /* error de conexión */
                request.onerror = function () {
                    reject("error de red");
                }
                 /* manda la petición */
                request.send();

            });

        }

        /* esta función modifica un juego ya existente */
        function modifyJugador() {
             /* Promise espera respuesta */
            return new Promise((resolve, reject) => {
                 /* toma el id del popup */
                const id = document.getElementById("editId").value;
                 /* crea petición */
                const request = new XMLHttpRequest();
                  /* PUT = actualizar */
                request.open('PUT', `${url}/${id}`);
                 /* enviamos json */
                request.setRequestHeader("Content-Type", "application/json");

                /* aca se toman los nuevos valores del popup */
                /* crea objeto actualizado */
                const jugador = JSON.stringify({
                    /* nombre actualizado */
                    name: document.getElementById("editName").value,
                    /* club actualizado */
                    club: document.getElementById("editClub").value,
                    /* nacionalidad actualizada */
                    nationality: document.getElementById("editNationality").value
                });
                /* cuando responde */
                request.onload = function () {
                    /* si salió bien */
                    if (request.status == 200) {
                        resolve(); // se actualizó bien
                    } else {
                        reject("no se pudo actualizar al jugador");
                    }

                }
                /* error de conexion */
                request.onerror = function () {
                    reject("error de red");
                }

                request.send(jugador);

            });

        }

        /* esta función carga todos los jugadores en la tabla */
        function getJugador() {
            /* trae a los juegadores */
            loadJugador()
                /* si salio bien */
                .then(jugadores => {
                    /* busca el tbody */
                    const tbody = document.querySelector("tbody");

                    tbody.innerHTML = ""; // limpia la tabla antes de volver a cargar
                     /* recorre todos los juegos */
                    jugadores.forEach(jugador => {
                        insertRow(jugador); // agrega una fila 
                    });

                })
                /* muestra errores */
                .catch(error => console.log(error));

        }

        /* esta funcion guarda un jugador nuevo */
        function saveJugador() {

            /* verifica que no esten vacios los campos de la tabla */
            if (
                document.getElementById("name").value.trim() != "" &&
                document.getElementById("club").value.trim() != "" &&
                document.getElementById("nationality").value.trim() != ""
            ) {
                /* llama a addJugador */
                addJugador()
                /* cuando termina de agregar */
                    .then(() => {
                        getJugador(); // vuelve a cargar a los jugadores de la tabla
                        clearInputs(); // limpia todoslos inputs
                    });

            }else{
                alert("Completa todos los campos por favor!!")
            }

        }

        /* elimina un juego */
        /* removeJugador() solo borra el jugador en la API */
        /* deleteJugador() sirve para actualizar la tabla */
        /* después de borrar vuelve a cargar a los jugadores */
        function deleteJugador(id) {
            /* llama a removeJugador para borrar el jugador en la API */
            removeJugador(id)
            /* espera que termine de borrarse */
                .then(() => {
                    /* vuelve a cargar la tabla actualizada */ 
                    getJugador();
                })
                /*Verifica errores*/
                .catch(error => {
                    console.log(error);
                });
            
        }

        /* actualiza un jugador */
        function updateJugador() {

            modifyJugador().then(() => { //llama a la función que modifica al jugador
                getJugador(); // obtiene los datos actualizados del jugador
                closePopup(); //cierra la ventanita (elPopup) 
            });
        }
        /* crea una fila en la tabla */
        /* crea una fila en la tabla */
        function insertRow(jugador) {
            console.log("Datos del jugador:", jugador);
            /* busca el tbody */
            const tbody = document.querySelector("tbody");
            /* crea una fila nueva */
            const row = tbody.insertRow();
        
            
            const id = jugador.id;// Importante: Verifica que jugador.id exista. 
            /* agrega datos dentro de la fila */
            row.innerHTML = `
                <td>${id}</td>
                <td>${jugador.name}</td>
                <td>${jugador.club}</td>
                <td>${jugador.nationality}</td>
                <td>
                    <button class="edit-btn">EDIT</button>
                </td>
                <td>
                    <button class="delete-btn">DELETE</button>
                </td>
            `;
            
            const editBtn = row.querySelector(".edit-btn");
            const deleteBtn = row.querySelector(".delete-btn");
            
            // Editar: Pasamos los datos actuales al popup
            editBtn.addEventListener("click", () => {
                openPopup(
                    id,
                    jugador.name,
                    jugador.club,
                    jugador.nationality
                );
            });
        
            // Eliminar: Llamamos a la función con el ID
            deleteBtn.addEventListener("click", () => {
                if(confirm("¿Seguro que quieres borrar a este jugador?")) {
                    deleteJugador(id);
                }
            });
        }

        /* abre la ventanita de editar */ 
        function openPopup(id, name, club, nationality) {
             /* muestra el popup */
            document.getElementById("popup").hidden = false;
            /* pone el id en el input */
            document.getElementById("editId").value = id;
            /* pone el nombre */
            document.getElementById("editName").value = name;
            /* pone el club */
            document.getElementById("editClub").value = club;
            /* pone la nacionalidad */
            document.getElementById("editNationality").value = nationality;

        }

        /* cierra el popup */
        function closePopup() {
            /* oculta el popup */
            document.getElementById("popup").hidden = true;
        }

        /* limpia los campos de agregar */
        function clearInputs() {
            /* limpia el input nombre */
            document.getElementById("name").value = "";
            /* limpia el input club */
            document.getElementById("club").value = "";
            /* limpia el input nacionalidad */
            document.getElementById("nationality").value = "";
        }
    </script>

</head>

<body>

    <h1>JUGADORES</h1>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Club</th>
                <th>Nationatily</th>
                <th colspan="2"></th>
            </tr>
        </thead>

        <tbody></tbody>

        <tfoot>
            <tr>

                <td></td>

                <td><input id="name" placeholder="Nombre"></td>
                <td><input id="club" placeholder="Club"></td>
                <td><input id="nationality" placeholder="Nationatily"></td>

                <td colspan="2">
                    <button class="add-btn" onclick="saveJugador()">ADD</button>
                </td>

            </tr>
        </tfoot>

    </table>

    <div id="popup" hidden>

        <h3>EDIT PLAYERS</h3>

        <input id="editId" readonly><br><br>
        <input id="editName"><br><br>
        <input id="editClub"><br><br>
        <input id="editNationality"><br><br>

        <button class="edit-btn" onclick="updateJugador()">UPDATE</button>
        <button class="delete-btn" onclick="closePopup()">CLOSE</button>

    </div>

</body>
</html>
